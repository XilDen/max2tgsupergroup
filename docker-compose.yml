services:
  max2tg:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    environment:
      DB_PATH: /app/data/max2tg.sqlite3
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
